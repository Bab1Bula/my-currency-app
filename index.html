<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPY 转 RM 汇率</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 80%; padding: 12px; margin: 15px 0; font-size: 18px; text-align: center; border: 1px solid #ccc; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 85%; }
        button:hover { background: #0056b3; }
        #result { font-size: 26px; font-weight: bold; margin-top: 20px; color: #333; }
        #rateInfo { font-size: 12px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🇯🇵 JPY ➡️ RM 🇲🇾</h2>
        <input type="number" id="jpyAmount" placeholder="输入 JPY 金额">
        <button onclick="convert()">转换</button>
        <div id="result">RM 0.00</div>
        <p id="rateInfo">正在获取最新汇率...</p>
    </div>

    <script>
        let currentRate = 0;

        // 调用免费 API 获取 JPY 到各国的最新汇率
        fetch('https://open.er-api.com/v6/latest/JPY')
            .then(res => res.json())
            .then(data => {
                currentRate = data.rates.MYR;
                // 为了方便看，显示 100 日元等于多少 RM
                document.getElementById('rateInfo').innerText = `当前汇率：100 JPY ≈ RM ${(currentRate * 100).toFixed(2)}`;
            })
            .catch(err => {
                document.getElementById('rateInfo').innerText = "无法获取汇率，请检查网络";
            });

        // 计算转换结果，严格输出 RM
        function convert() {
            let amount = document.getElementById('jpyAmount').value;
            if(amount && currentRate) {
                let myr = amount * currentRate;
                document.getElementById('result').innerText = 'RM ' + myr.toFixed(2);
            } else {
                document.getElementById('result').innerText = '请输入有效金额';
            }
        }
    </script>
</body>
</html>
