<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <title>JPY ⇌ RM Pro</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5169/5169120.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5169/5169120.png">
    <link rel="manifest" href="manifest.json">

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 25px;
            width: 90%; max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { margin: 0; font-weight: 500; font-size: 22px; letter-spacing: 1px; color: #38bdf8; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; padding-left: 5px; }
        .input-group input {
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 18px 20px; font-size: 28px; color: #fff;
            outline: none; transition: all 0.3s ease; text-align: right;
        }
        .input-group input:focus { border-color: #38bdf8; background: rgba(0, 0, 0, 0.3); }
        .currency-symbol { position: absolute; left: 20px; bottom: 18px; font-size: 22px; color: #cbd5e1; font-weight: 500; }
        .swap-icon { text-align: center; color: #475569; font-size: 24px; margin: -10px 0 15px 0; }
        #status { text-align: center; font-size: 12px; color: #64748b; margin-top: 20px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <h2>汇率转换 Pro</h2>
        </div>

        <div class="input-group">
            <label>日元 (JPY)</label>
            <span class="currency-symbol">¥</span>
            <input type="number" id="inputJpy" placeholder="0" oninput="calcToMyr()">
        </div>

        <div class="swap-icon">⇅</div>

        <div class="input-group">
            <label>马币 (MYR)</label>
            <span class="currency-symbol">RM</span>
            <input type="number" id="inputMyr" placeholder="0" oninput="calcToJpy()">
        </div>

        <div id="status">
            <span class="dot" style="background-color:#f59e0b;"></span>正在连接...
        </div>
    </div>

    <script>
        // 默认备用汇率 (离线时使用)
        let myrRate = 0.0249; 
        const statusEl = document.getElementById('status');
        const jpyInput = document.getElementById('inputJpy');
        const myrInput = document.getElementById('inputMyr');

        function updateUI(isOffline) {
            if (isOffline) {
                statusEl.innerHTML = `<span class="dot" style="background-color:#f59e0b;"></span>离线模式: 100 JPY ≈ RM ${(myrRate * 100).toFixed(2)}`;
            } else {
                statusEl.innerHTML = `<span class="dot" style="background-color:#10b981;"></span>实时汇率: 100 JPY ≈ RM ${(myrRate * 100).toFixed(2)}`;
            }
            // 自动计算当前输入框的值
            if (jpyInput.value) calcToMyr();
            else if (myrInput.value) calcToJpy();
        }

        // 尝试获取最新汇率，加一个 3 秒超时限制
        const fetchPromise = fetch('https://open.er-api.com/v6/latest/JPY').then(res => res.json());
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('超时')), 3000));

        Promise.race([fetchPromise, timeoutPromise])
            .then(data => {
                myrRate = data.rates.MYR;
                updateUI(false);
            })
            .catch(() => {
                // 如果获取失败或超时，直接使用备用汇率
                updateUI(true);
            });

        function calcToMyr() {
            let jpy = parseFloat(jpyInput.value);
            if (isNaN(jpy)) { myrInput.value = ''; return; }
            myrInput.value = (jpy * myrRate).toFixed(2);
        }

        function calcToJpy() {
            let myr = parseFloat(myrInput.value);
            if (isNaN(myr)) { jpyInput.value = ''; return; }
            jpyInput.value = (myr / myrRate).toFixed(0);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
