<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>JPY ⇌ RM Pro</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5169/5169120.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5169/5169120.png">
    <link rel="manifest" href="manifest.json">

    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 25px;
            width: 90%; max-width: 380px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .header h2 { text-align: center; font-weight: 500; font-size: 22px; color: #38bdf8; margin: 0 0 30px 0; }
        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        .input-group input {
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 18px 20px 18px 50px; font-size: 28px; color: #fff;
            outline: none; text-align: right;
        }
        .currency-symbol { position: absolute; left: 20px; bottom: 18px; font-size: 22px; color: #cbd5e1; }
        .swap-icon { text-align: center; color: #475569; font-size: 24px; margin-bottom: 15px; }
        #status { text-align: center; font-size: 12px; color: #64748b; margin-top: 20px; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header"><h2>汇率转换 Pro</h2></div>
        <div class="input-group">
            <label>日元 (JPY)</label>
            <span class="currency-symbol">¥</span>
            <input type="number" id="inputJpy" placeholder="0" oninput="calcToMyr()">
        </div>
        <div class="swap-icon">⇅</div>
        <div class="input-group">
            <label>马币 (MYR)</label>
            <span class="currency-symbol">RM</span>
            <input type="number" id="inputMyr" placeholder="0" oninput="calcToJpy()">
        </div>
        <div id="status"><span class="dot" style="background-color:#f59e0b;"></span>正在连接...</div>
    </div>
    <script>
        let myrRate = 0.0249; // 备用汇率
        const statusEl = document.getElementById('status');
        const jpyInput = document.getElementById('inputJpy');
        const myrInput = document.getElementById('inputMyr');

        function updateUI(isOffline) {
            statusEl.innerHTML = `<span class="dot" style="background-color:${isOffline?'#f59e0b':'#10b981'};"></span>${isOffline?'离线模式':'实时汇率'}: 100 JPY ≈ RM ${(myrRate * 100).toFixed(2)}`;
            calcToMyr();
        }

        const fetchWithTimeout = (url, timeout = 3000) => {
            return Promise.race([fetch(url), new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeout))]);
        };

        fetchWithTimeout('https://open.er-api.com/v6/latest/JPY')
            .then(res => res.json())
            .then(data => { myrRate = data.rates.MYR; updateUI(false); })
            .catch(() => updateUI(true));

        function calcToMyr() {
            let val = parseFloat(jpyInput.value);
            myrInput.value = isNaN(val) ? '' : (val * myrRate).toFixed(2);
        }
        function calcToJpy() {
            let val = parseFloat(myrInput.value);
            jpyInput.value = isNaN(val) ? '' : (val / myrRate).toFixed(0);
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
